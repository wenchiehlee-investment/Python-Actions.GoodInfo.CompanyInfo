name: Sync to Analyzer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"  # Runs at 09:00 UTC (17:00 Taipei Time)
  push:
     branches:
       - main
     paths:
       - raw_companyinfo.csv
       - raw_column_definition.md

concurrency:
  group: sync-analyzer
  cancel-in-progress: false

jobs:
  sync-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync raw_companyinfo.csv
        uses: BetaHuhn/repo-file-sync-action@latest
        with:
          GH_PAT: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_INVESTMENT }}
          CONFIG_PATH: .github/sync-to-Analyzer.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true

      - name: Sync raw_companyinfo.csv to InvestorConference
        uses: BetaHuhn/repo-file-sync-action@latest
        with:
          GH_PAT: ${{ secrets.REPO_FILE_SYNC_WENCHIEHLEE_MONEY }}
          CONFIG_PATH: .github/sync-to-InvestorConference.yml
          COMMIT_EACH_FILE: false
          PR_LABELS: "automated-sync"
          SKIP_PR: true
